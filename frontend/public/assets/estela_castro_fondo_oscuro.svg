<svg viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg" width="700" height="520" id="mainsvg">
  <title>Estela Castro Naturopatía — Fondo oscuro</title>
  <defs>
    <linearGradient id="fadeTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9A7B3C" stop-opacity="1"/>
      <stop offset="65%"  stop-color="#9A7B3C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9A7B3C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#9A7B3C" stop-opacity="1"/>
      <stop offset="65%"  stop-color="#9A7B3C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9A7B3C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#9A7B3C" stop-opacity="1"/>
      <stop offset="65%"  stop-color="#9A7B3C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9A7B3C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#9A7B3C" stop-opacity="1"/>
      <stop offset="65%"  stop-color="#9A7B3C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9A7B3C" stop-opacity="0"/>
    </linearGradient>
    <mask id="circleCutout">
      <rect width="700" height="520" fill="white"/>
      <circle id="mT" cx="350" cy="80"  r="3.8" fill="black"/>
      <circle id="mB" cx="350" cy="290" r="3.8" fill="black"/>
      <circle id="mR" cx="455" cy="185" r="3.8" fill="black"/>
      <circle id="mL" cx="245" cy="185" r="3.8" fill="black"/>
    </mask>
  </defs>

  <text id="refText" x="350" y="-999" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52" letter-spacing="10" fill="none">ESTELA CASTRO</text>

  <g id="logoGroup">
    <g mask="url(#circleCutout)">
      <circle cx="350" cy="185" r="105" fill="none" stroke="#9A7B3C" stroke-width="1"
        stroke-dasharray="4,5,8,3,2,6,10,4,3,7,5,2" stroke-dashoffset="12" opacity="0.75"/>
      <circle cx="350" cy="185" r="107" fill="none" stroke="#9A7B3C" stroke-width="0.5"
        stroke-dasharray="2,9,5,4,3,8,6,3,2,7" stroke-dashoffset="5" opacity="0.35"/>
      <circle cx="350" cy="185" r="88" fill="none" stroke="#9A7B3C" stroke-width="1.1" opacity="0.85"/>
      <rect x="349" y="85"  width="2" height="43" fill="url(#fadeTop)"    opacity="0.95"/>
      <rect x="349" y="242" width="2" height="43" fill="url(#fadeBottom)" opacity="0.95"/>
      <rect x="407" y="184" width="43" height="2" fill="url(#fadeRight)"  opacity="0.95"/>
      <rect x="250" y="184" width="43" height="2" fill="url(#fadeLeft)"   opacity="0.95"/>
      <g fill="none" stroke="#9A7B3C" stroke-width="1.3" stroke-linecap="round">
        <path d="M350,185 C328,175 328,147 350,137 C372,147 372,175 350,185Z"/>
        <path d="M350,185 C328,195 328,223 350,233 C372,223 372,195 350,185Z"/>
        <path d="M350,185 C360,163 388,163 398,185 C388,207 360,207 350,185Z"/>
        <path d="M350,185 C340,163 312,163 302,185 C312,207 340,207 350,185Z"/>
        <path d="M350,185 C345,163 368,141 389,146 C394,167 372,183 350,185Z"/>
        <path d="M350,185 C372,187 394,203 389,224 C368,229 345,207 350,185Z"/>
        <path d="M350,185 C355,207 328,229 311,224 C306,203 328,187 350,185Z"/>
        <path d="M350,185 C328,183 306,167 311,146 C332,141 355,163 350,185Z"/>
      </g>
      <g stroke="#9A7B3C" stroke-width="0.7" opacity="0.55" stroke-linecap="round">
        <line x1="350" y1="185" x2="350" y2="139"/>
        <line x1="350" y1="185" x2="350" y2="231"/>
        <line x1="350" y1="185" x2="396" y2="185"/>
        <line x1="350" y1="185" x2="304" y2="185"/>
        <line x1="350" y1="185" x2="387" y2="148"/>
        <line x1="350" y1="185" x2="387" y2="222"/>
        <line x1="350" y1="185" x2="313" y2="222"/>
        <line x1="350" y1="185" x2="313" y2="148"/>
      </g>
      <circle cx="350" cy="185" r="3.2" fill="#9A7B3C"/>
    </g>

    <circle cx="350" cy="80"  r="4.5" fill="none" stroke="#9A7B3C" stroke-width="1.1"/>
    <circle cx="350" cy="290" r="4.5" fill="none" stroke="#9A7B3C" stroke-width="1.1"/>
    <circle cx="455" cy="185" r="4.5" fill="none" stroke="#9A7B3C" stroke-width="1.1"/>
    <circle cx="245" cy="185" r="4.5" fill="none" stroke="#9A7B3C" stroke-width="1.1"/>

    <text id="txtMain" x="350" y="348" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="52" font-weight="400" letter-spacing="10"
      fill="#FFFFFF">ESTELA CASTRO</text>

    <line x1="158" y1="369" x2="220" y2="369" stroke="#9A7B3C" stroke-width="1"/>
    <text x="350" y="378" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="22" font-weight="400" letter-spacing="8"
      fill="#9A7B3C">NATUROPATÍA</text>
    <line x1="480" y1="369" x2="542" y2="369" stroke="#9A7B3C" stroke-width="1"/>

    <text x="350" y="415" text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="13.5" font-weight="400" letter-spacing="4.5"
      fill="#FFFFFF">CIENCIA · NATURALEZA · EQUILIBRIO</text>
  </g>

  <script><![CDATA[
  (function() {
    function adjust() {
      const ref = document.getElementById('refText');
      const bb = ref.getBBox();
      const offset = 350 - (bb.x + bb.width / 2);
      document.getElementById('logoGroup').setAttribute('transform', 'translate(' + offset + ',0)');
      var maskCx = 350 + offset;
      document.getElementById('mT').setAttribute('cx', maskCx);
      document.getElementById('mB').setAttribute('cx', maskCx);
    }
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(adjust);
    }
    setTimeout(adjust, 50);
    setTimeout(adjust, 300);
  })();
  ]]></script>
</svg>
