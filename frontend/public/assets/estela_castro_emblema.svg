<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" width="300" height="300">
  <title>Estela Castro Naturopatía — Emblema</title>
  <defs>
    <linearGradient id="fadeTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9A7B3C" stop-opacity="1"/>
      <stop offset="65%"  stop-color="#9A7B3C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9A7B3C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#9A7B3C" stop-opacity="1"/>
      <stop offset="65%"  stop-color="#9A7B3C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9A7B3C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#9A7B3C" stop-opacity="1"/>
      <stop offset="65%"  stop-color="#9A7B3C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9A7B3C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#9A7B3C" stop-opacity="1"/>
      <stop offset="65%"  stop-color="#9A7B3C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9A7B3C" stop-opacity="0"/>
    </linearGradient>
    <mask id="circleCutout">
      <rect width="300" height="300" fill="white"/>
      <circle cx="150" cy="45"  r="3.8" fill="black"/>
      <circle cx="150" cy="255" r="3.8" fill="black"/>
      <circle cx="255" cy="150" r="3.8" fill="black"/>
      <circle cx="45"  cy="150" r="3.8" fill="black"/>
    </mask>
  </defs>

  <!-- Emblem centered at 150,150 -->
  <g mask="url(#circleCutout)">
    <circle cx="150" cy="150" r="105" fill="none" stroke="#9A7B3C" stroke-width="1"
      stroke-dasharray="4,5,8,3,2,6,10,4,3,7,5,2" stroke-dashoffset="12" opacity="0.75"/>
    <circle cx="150" cy="150" r="107" fill="none" stroke="#9A7B3C" stroke-width="0.5"
      stroke-dasharray="2,9,5,4,3,8,6,3,2,7" stroke-dashoffset="5" opacity="0.35"/>
    <circle cx="150" cy="150" r="88" fill="none" stroke="#9A7B3C" stroke-width="1.1" opacity="0.85"/>
    <rect x="149" y="50"  width="2" height="43" fill="url(#fadeTop)"    opacity="0.95"/>
    <rect x="149" y="207" width="2" height="43" fill="url(#fadeBottom)" opacity="0.95"/>
    <rect x="207" y="149" width="43" height="2" fill="url(#fadeRight)"  opacity="0.95"/>
    <rect x="50"  y="149" width="43" height="2" fill="url(#fadeLeft)"   opacity="0.95"/>
    <g fill="none" stroke="#9A7B3C" stroke-width="1.3" stroke-linecap="round">
      <path d="M150,150 C128,140 128,112 150,102 C172,112 172,140 150,150Z"/>
      <path d="M150,150 C128,160 128,188 150,198 C172,188 172,160 150,150Z"/>
      <path d="M150,150 C160,128 188,128 198,150 C188,172 160,172 150,150Z"/>
      <path d="M150,150 C140,128 112,128 102,150 C112,172 140,172 150,150Z"/>
      <path d="M150,150 C145,128 168,106 189,111 C194,132 172,148 150,150Z"/>
      <path d="M150,150 C172,152 194,168 189,189 C168,194 145,172 150,150Z"/>
      <path d="M150,150 C155,172 128,194 111,189 C106,168 128,152 150,150Z"/>
      <path d="M150,150 C128,148 106,132 111,111 C132,106 155,128 150,150Z"/>
    </g>
    <g stroke="#9A7B3C" stroke-width="0.7" opacity="0.55" stroke-linecap="round">
      <line x1="150" y1="150" x2="150" y2="104"/>
      <line x1="150" y1="150" x2="150" y2="196"/>
      <line x1="150" y1="150" x2="196" y2="150"/>
      <line x1="150" y1="150" x2="104" y2="150"/>
      <line x1="150" y1="150" x2="187" y2="113"/>
      <line x1="150" y1="150" x2="187" y2="187"/>
      <line x1="150" y1="150" x2="113" y2="187"/>
      <line x1="150" y1="150" x2="113" y2="113"/>
    </g>
    <circle cx="150" cy="150" r="3.2" fill="#9A7B3C"/>
  </g>

  <circle cx="150" cy="45"  r="4.5" fill="none" stroke="#9A7B3C" stroke-width="1.1"/>
  <circle cx="150" cy="255" r="4.5" fill="none" stroke="#9A7B3C" stroke-width="1.1"/>
  <circle cx="255" cy="150" r="4.5" fill="none" stroke="#9A7B3C" stroke-width="1.1"/>
  <circle cx="45"  cy="150" r="4.5" fill="none" stroke="#9A7B3C" stroke-width="1.1"/>
</svg>
